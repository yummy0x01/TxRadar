# TxRadar — MAINNET profile (final graded lifecycle-log campaign, real SOL).
# Identical shape to testnet.toml; only endpoints/network differ.
# Use tiny tips — this profile spends REAL SOL. Secrets live in .env.

network = "mainnet"

[rpc]
# SolInfra RPC (Frankfurt) base URL. The api_key is injected at runtime from
# TXRADAR_RPC_API_KEY (kept out of this file). Falls back to public mainnet-beta
# if no key is set.
http_url = "https://fra.rpc.solinfra.dev/sol"
blockhash_commitment = "confirmed"

[yellowstone]
# SolInfra Yellowstone gRPC (Frankfurt). Auth token in TXRADAR_YELLOWSTONE_X_TOKEN.
endpoint = "https://fra.grpc.solinfra.dev:443"
ping_interval_secs = 30
channel_capacity = 8192
stream_window_bytes = 4194304

[yellowstone.reconnect]
enabled = true
initial_backoff_ms = 250
max_backoff_ms = 10000
replay_from_last_slot = true

[jito]
# Frankfurt — matches SolInfra's `fra` region for low send latency.
block_engine_url = "https://frankfurt.mainnet.block-engine.jito.wtf/api/v1"
max_requests_per_sec = 1
tip_floor_rest = "https://bundles.jito.wtf/api/v1/bundles/tip_floor"
tip_floor_ws = "wss://bundles.jito.wtf/api/v1/bundles/tip_stream"

[tips]
# Real money — but the tip must be competitive enough to actually LAND. The live
# Jito floor during congestion runs p95≈100k, p99≈800k lamports, so the ceiling
# must clear p95 or bundles never win inclusion. 300k = 0.0003 SOL worst case per
# landing; the 0.02 SOL budget covers dozens of landings. The agent/oracle still
# pick dynamically within [min, max] off the live floor.
min_lamports = 1000
max_lamports = 300000
ema_alpha = 0.3

[lifecycle]
processed_timeout_secs = 30
confirmed_timeout_secs = 60
finalized_timeout_secs = 120
status_poll_interval_secs = 2

[agent]
provider = "gemini"
model = "gemini-2.5-flash"
max_retries = 4
require_approval = false

[log]
path = "./logs/lifecycle.jsonl"
